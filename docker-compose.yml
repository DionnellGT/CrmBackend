services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: crm-backend-dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Sobreescribe lo que haya en .env: dentro de la red de docker-compose
      # los servicios se resuelven por nombre, no por localhost.
      - DATABASE_URL=postgresql://crm:crm@postgres:5432/crm?schema=public
      - DIRECT_URL=postgresql://crm:crm@postgres:5432/crm?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
      - /app/node_modules # evita que el volumen del host pise el node_modules del contenedor
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=crm
      - POSTGRES_PASSWORD=crm
      - POSTGRES_DB=crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
